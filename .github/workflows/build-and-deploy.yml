name: Build and Deploy with Secure API Keys

on:
  push:
    branches:
      - main
      - test
  pull_request:
    branches:
      - main

env:
  DEPLOY_BRANCH: gh-pages
  BUILD_DIR: dist

jobs:
  setup-env:
    name: Set up Environment Variables for Build
    runs-on: ubuntu-latest
    outputs:
      or_api_key_hash: ${{ steps.generate-hash.outputs.or_api_key_hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate API Key Hash for Embedding
        # We create a hash of the API key that gets embedded in the build
        # The actual decryption happens client-side if user has password
        id: generate-hash
        run: |
          # Import nodejs crypto module
          node <<EOF
            const crypto = require('crypto');
            
            const orApiKey = process.env.OR_API_KEY || 'demo_key_not_recommended';
            const salt = crypto.randomBytes(16).toString('hex');
            const iterations = 100000;
            const keyLength = 32;

            // Derive a key from the API key + salt using PBKDF2
            const algorithm = {
              name: 'PBKDF2',
              hash: 'SHA-256',
              salt: Buffer.from(salt, 'hex'),
              iterations: iterations,
              length: keyLength
            };

            const keyMaterial = crypto.pbkdf2Sync(
              orApiKey,
              algorithm.salt,
              algorithm.iterations,
              algorithm.length / 8,
              'sha256'
            );

            const apiToken = Buffer.concat([keyMaterial, Buffer.from(salt)]).toString('base64');
            
            console.log('API_TOKEN=' + apiToken);
            process.env.API_TOKEN = apiToken;
          EOF
        shell: bash

  build-and-deploy:
    name: Build and Deploy to GitHub Pages
    needs: setup-env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --if-present || true

      - name: Set environment variables from secrets
        # Inject API keys as build-time environment variables
        # These are hashed/embedded in the bundle for client-side use
        env:
          OR_API_KEY: ${{ secrets.OR_API_KEY }}
        run: |
          echo "Setting build environment from GitHub Actions secrets..."
          
          # Generate encrypted token hash
          node <<EOF
            const crypto = require('crypto');
            
            const orApiKey = process.env.OR_API_KEY || 'demo_key_not_recommended';
            const salt = crypto.randomBytes(16).toString('hex');
            const iterations = 100000;
            const keyLength = 32;

            const algorithm = {
              name: 'PBKDF2',
              hash: 'SHA-256',
              salt: Buffer.from(salt, 'hex'),
              iterations: iterations,
              length: keyLength
            };

            const keyMaterial = crypto.pbkdf2Sync(
              orApiKey,
              algorithm.salt,
              algorithm.iterations,
              algorithm.length / 8,
              'sha256'
            );

            // Combine encrypted token with salt for client-side decryption
            const apiToken = Buffer.concat([keyMaterial, Buffer.from(salt)]).toString('base64');
            
            console.log('INJECT_API_TOKEN=' + apiToken);
          EOF
        shell: bash

      - name: Create build config file
        run: |
          mkdir -p ${{ env.BUILD_DIR }}/config
          
          # Create encrypted API key configuration
          cat > ${{ env.BUILD_DIR }}/config/api-keys.json <<ENDBLOCK
          {
            "apiKeys": {
              "openrouteservice": "${{ env.INJECT_API_TOKEN }}"
            },
            "encryptionHint": "Use ApiKeyManager.decrypt() with your password"
          }
          ENDBLOCK
          
          echo "✓ Created build config at ${{ env.BUILD_DIR }}/config/api-keys.json"
        shell: bash

      - name: Build static assets
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          
          # Copy all files except gitignored ones and .env
          find . \
            -name ".*" -prune -o \
            \( -name "node_modules" -prune -o -name "*.map" -prune \) -prune -o \
            -type f ! -path "./.git/*" \
            -print 2>/dev/null | grep -v '\.env$' | while read file; do
            # Copy non-gitignored files to build dir
            if [ -f "$file" ]; then
              cp --no-preserve=mode "$file" ${{ env.BUILD_DIR }}/ 2>/dev/null || true
            fi
          done
          
          echo "✓ Built static assets to ${{ env.BUILD_DIR }}/"
        shell: bash

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.BUILD_DIR }}
          force_or_source: true

  # Optional: Test job before deploy
  test:
    name: Run Tests (if e2e tests exist)
    needs: setup-env
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci --if-present || true
      
      # Only run tests if they exist
      - name: Run Playwright tests (optional)
        run: |
          if [ -f "e2e/playwright.config.js" ]; then
            npx playwright test
          else
            echo "No e2e tests found, skipping..."
          fi
        continue-on-error: true
