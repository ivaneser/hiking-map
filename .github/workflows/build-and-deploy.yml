name: Build and Deploy

on:
  push:
    branches: [main, test]

permissions:
  contents: write

env:
  BUILD_DIR: dist

jobs:
  build-and-deploy:
    name: Build and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          OR_API_KEY: ${{ secrets.OR_API_KEY }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${OR_API_KEY:-}" ]; then
            echo "ERROR: Required secret OR_API_KEY is missing."
            echo "Set it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          if [ -z "${DEPLOY_TOKEN:-}" ]; then
            echo "ERROR: Required secret DEPLOY_TOKEN is missing."
            echo "Set it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Prepare dist
        env:
          OR_API_KEY: ${{ secrets.OR_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "${BUILD_DIR}"

          # Copy app files (current split structure)
          cp index.html "${BUILD_DIR}/"
          cp style.css "${BUILD_DIR}/"
          cp script.js "${BUILD_DIR}/"
          cp api-keys.js "${BUILD_DIR}/"
          cp config.js "${BUILD_DIR}/"
          cp setup-api-keys.js "${BUILD_DIR}/"

          # Generate runtime secrets file from GitHub secrets.
          # Keeps API key out of repository source.
          python3 - <<'PY'
import base64, os, pathlib

build_dir = pathlib.Path(os.environ['BUILD_DIR'])
api_key = os.environ.get('OR_API_KEY', '').strip()
secret = 'hiking-map-demo-fallback-v1'

enc = ''
if api_key:
    data = bytes([ord(c) ^ ord(secret[i % len(secret)]) for i, c in enumerate(api_key)])
    enc = base64.b64encode(data).decode()

content = f"""// Auto-generated during CI deploy\nwindow.RUNTIME_SECRETS = {{\n  demoFallbackKeyEnc: \"{enc}\",\n  demoFallbackSecret: \"{secret if api_key else ''}\"\n}};\n"""
(build_dir / 'runtime-secrets.js').write_text(content)
print('runtime-secrets.js generated')
PY

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ${{ env.BUILD_DIR }}
