name: Build and Deploy with Secure API Keys

on:
  push:
    branches:
      - main
      - test
  pull_request:
    branches:
      - main

env:
  DEPLOY_BRANCH: gh-pages
  BUILD_DIR: dist

jobs:
  setup-env:
    name: Set up Environment Variables for Build
    runs-on: ubuntu-latest
    outputs:
      or_api_key_hash: ${{ steps.generate-hash.outputs.or_api_key_hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate API Key Hash for Embedding
        id: generate-hash
        run: |
          node <<EOF
            const crypto = require('crypto');
            
            const orApiKey = process.env.OR_API_KEY || 'demo_key_not_recommended';
            const salt = crypto.randomBytes(16).toString('hex');
            const iterations = 100000;
            const keyLength = 32;

            const algorithm = {
              name: 'PBKDF2',
              hash: 'SHA-256',
              salt: Buffer.from(salt, 'hex'),
              iterations: iterations,
              length: keyLength
            };

            const keyMaterial = crypto.pbkdf2Sync(
              orApiKey,
              algorithm.salt,
              algorithm.iterations,
              algorithm.length / 8,
              'sha256'
            );

            const apiToken = Buffer.concat([keyMaterial, Buffer.from(salt)]).toString('base64');
            
            console.log('API_TOKEN=' + apiToken);
            process.env.API_TOKEN = apiToken;
          EOF
        shell: bash

  build-and-deploy:
    name: Build and Deploy to GitHub Pages
    needs: setup-env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables from secrets
        run: |
          echo "OR_API_KEY=${{ secrets.OR_API_KEY }}"

      - name: Create build config file
        run: |
          mkdir -p ${{ env.BUILD_DIR }}/config
          
          cat > ${{ env.BUILD_DIR }}/config/api-keys.json <<ENDBLOCK
          {
            "apiKeys": {
              "openrouteservice": "${{ secrets.OR_API_KEY }}"
            },
            "encryptionHint": "Use ApiKeyManager.decrypt() with your password"
          }
          ENDBLOCK
          
          echo "✓ Created build config at ${{ env.BUILD_DIR }}/config/api-keys.json"
        shell: bash

      - name: Build static assets
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          
          # Copy HTML
          cp index.html ${{ env.BUILD_DIR }}/ 2>/dev/null || true
          
          # Copy CSS
          cp style.css ${{ env.BUILD_DIR }}/ 2>/dev/null || true
          
          # Copy JavaScript
          cp script.js ${{ env.BUILD_DIR }}/ 2>/dev/null || true
          
          # Copy config folder
          mkdir -p ${{ env.BUILD_DIR }}/config
          cp config/api-keys.js ${{ env.BUILD_DIR }}/config/ 2>/dev/null || true
          cp config/index.js ${{ env.BUILD_DIR }}/config/ 2>/dev/null || true
          
          # Copy docs folder
          mkdir -p ${{ env.BUILD_DIR }}/docs
          cp docs/API_KEY_SETUP.md ${{ env.BUILD_DIR }}/docs/ 2>/dev/null || true
          cp docs/SECURITY_GUIDE.md ${{ env.BUILD_DIR }}/docs/ 2>/dev/null || true
          
          # Copy scripts folder
          mkdir -p ${{ env.BUILD_DIR }}/scripts
          cp scripts/setup-api-keys.js ${{ env.BUILD_DIR }}/scripts/ 2>/dev/null || true
          
          echo "✓ Built static assets to ${{ env.BUILD_DIR }}/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ${{ env.BUILD_DIR }}
          force_or_source: true

  test:
    name: Run Tests (if e2e tests exist)
    needs: setup-env
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci --if-present || true
      
      - name: Run Playwright tests (optional)
        run: |
          if [ -f "e2e/playwright.config.js" ]; then
            npx playwright test
          else
            echo "No e2e tests found, skipping..."
          fi
        continue-on-error: true
