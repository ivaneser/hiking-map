<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/hiking-map/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2d3748" />
    
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
          crossorigin="" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Leaflet Draw for drawing tools -->
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css" />

    <!-- Security Configuration Scripts (load in order!) -->
    <script type="module" src="api-keys.js"></script>
    <script type="text/javascript" src="config.js"></script>
  </head>
  <body class="d-flex flex-column min-vh-100">
    
    <!-- Main Application Script -->
    <script src="script.js"></script>
    
    <!-- Leaflet Draw Initialization -->
    <script>
      if (typeof window !== 'undefined') {
        const originalMapSetup = typeof window.setupMaps === 'function' ? window.setupMaps : null;
        
        if (originalMapSetup) {
          window.setupMaps = function(map) {
            var drawnItems = new L.FeatureGroup();
            
            var drawControl = new L.Control.Draw({
              edit: {
                featureGroup: drawnItems,
                remove: true
              },
              draw: {
                polygon: {
                  show: true,
                  allowIntersection: false
                },
                polyline: {
                  show: false
                },
                circlemarker: {
                  show: false
                },
                rectangle: {
                  show: false
                }
              }
            });
            
            setTimeout(() => {
              if (map) {
                map.addControl(drawControl);
                
                map.on('draw:created', function(e) {
                  const layer = e.layer;
                  
                  if (layer.getBounds && typeof layer.getBounds === 'function') {
                    const polygonArea = layer.getArea();
                    
                    layer.area_m2 = polygonArea.toFixed(2);
                    layer.properties = {
                      geometry: layer.toGeoJSON(),
                      area_m2: polygonArea.toFixed(2)
                    };
                    console.log(`Created polygon with area: ${polygonArea.toFixed(2)} m2`);
                    
                    let polygonIcon = L.Icon.Default.prototype._getIconUrl();
                    layer.setIcon(new L.DivIcon({
                      className: 'custom-polygon',
                      html: '<div style="background-color: transparent; border-radius: 50%; display: inline-block; width: 12px; height: 12px; background-color: #27ae60;"></div>',
                      iconSize: [12, 12],
                      iconAnchor: [6, 6],
                      popupAnchor: [0, -8]
                    }));
                  }
                });
                
                map.on('draw:deleted', function(e) {
                  console.log('Polygon deleted');
                });
              }
            }, 0);
          };
        }
      }
    </script>

    <!-- API Key Setup Modal -->
    <script src="setup-api-keys.js"></script>
    
    <!-- Leaflet JavaScript -->
    <script 
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

  </body>
</html>
