<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hiking Loop Planner</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQ2ATbYpHj4xyWmHmXdkPq2ZOi+NiyY="
    crossorigin=""
  >
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section class="map-panel" aria-label="Map panel">
      <header>
          <h1>Hiking Loop Planner</h1>
          <p class="subtitle" id="summary">Move the map, then search the visible area</p>
    </header>
    <div class="map-wrap">
        <div id="map" role="img" aria-label="Hiking spots on OpenStreetMap"></div>
	    <div class="floating-controls">
  	      <button id="gpxButton" class="icon-button" type="button" title="Save route">
  	        💾
  	      </button>
	      <label class="icon-button" title="Load route">
	        📂
	        <input id="gpxInput" type="file" accept=".gpx,application/gpx+xml">
	      </label>		 	
		  <button id="locateButton" class="circle-map-button" type="button" title="My location">
		  📍
		  </button>	
	      <button id="routeButton" class="circle-map-button" type="button" title="Build route">
	        🥾
	      </button>
	      <button id="searchButton" class="circle-map-button" type="button" title="Search">
	        🔍
	      </button>
	    </div>
        <div class="empty-state" id="emptyState">No data loaded yet.</div>
    </div>
  </section>

    <aside class="side-panel" aria-label="Spot list and filters">
      <div class="stats" id="stats"></div>
      <div class="filters">
        <input class="search" id="searchInput" type="search" placeholder="Search name, type, or tags">
      </div>
      <div class="list" id="list"></div>
    </aside>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
    <script src="api-keys.js"></script>
  <script src="config.js"></script>
  <script src="setup-api-keys.js"></script>
  <script src="runtime-secrets.js"></script>
  <script src="script.js"></script>
</body>
</html>
