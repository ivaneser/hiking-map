<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/hiking-map/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2d3748" />
    
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
          crossorigin="" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Leaflet Draw for drawing tools (CSS only) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css" />

    <!-- API Keys Module (type=module, exports to window) -->
    <script type="module">
      // Load api-keys.js and expose ApiKeyManager globally
      import { ApiKeyManager } from './api-keys.js';
      window.ApiKeyManager = ApiKeyManager;
    </script>
    
    <!-- Config (uses ApiKeyManager after it's exported) -->
    <script type="text/javascript" src="config.js"></script>
  </head>
  <body class="d-flex flex-column min-vh-100">
    
    <!-- Leaflet JS (must load first in body) -->
    <script 
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <!-- Leaflet Draw -->
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

    <!-- Setup Modal (after Leaflet loaded) -->
    <script src="setup-api-keys.js"></script>
    
    <!-- Main Application Script (after all dependencies!) -->
    <script src="script.js"></script>

  </body>
</html>
